name: Release

# Gera os pacotes das 3 plataformas e publica num release (rascunho).
# Dispare criando uma tag `vX.Y.Z` (ex.: `git tag v0.1.0 && git push --tags`)
# ou manualmente em Actions › Release › Run workflow.
#
# Saída (assets do release):
#   • Windows: .exe (instalador NSIS)
#   • Linux:   .deb, .rpm, .AppImage
#   • macOS:   .zip com o Printseca.app pronto + guias de abertura
# Nada de passo manual: o próprio CI monta tudo, inclusive o zip do Mac.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # macOS (Apple Silicon): .app dentro de um .zip
          - platform: ubuntu-22.04 # Linux x64: .deb, .rpm, .AppImage
          - platform: windows-latest # Windows x64: .exe (NSIS)

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: printseca
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./printseca/src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Prepare SumatraPDF (auxiliar de impressão no Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ver = "3.6.1"
          $zip = "$env:RUNNER_TEMP\sumatra.zip"
          Invoke-WebRequest -Uri "https://www.sumatrapdfreader.org/dl/rel/$ver/SumatraPDF-$ver-64.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\sumatra" -Force
          New-Item -ItemType Directory -Force -Path "src-tauri\resources" | Out-Null
          Copy-Item "$env:RUNNER_TEMP\sumatra\SumatraPDF-$ver-64.exe" "src-tauri\resources\SumatraPDF.exe" -Force

      - name: Install JS dependencies
        run: npm ci

      # ---------------------------------------------------------------- macOS
      # Compila o .app, faz a assinatura ad-hoc e empacota com os guias no zip.
      - name: macOS — build .app + zip com guias
        if: matrix.platform == 'macos-latest'
        run: bash packaging/macos/build_zip.sh

      # ---------------------------------------------------------------- Linux
      - name: Linux — build .deb/.rpm/.AppImage
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          npm run tauri build -- --bundles deb,rpm,appimage
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/deb/*.deb artifacts/
          cp src-tauri/target/release/bundle/rpm/*.rpm artifacts/
          cp src-tauri/target/release/bundle/appimage/*.AppImage artifacts/

      # -------------------------------------------------------------- Windows
      - name: Windows — build .exe (NSIS)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          npm run tauri build -- --bundles nsis
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item src-tauri\target\release\bundle\nsis\*.exe artifacts\

      # -------------------------------------------------------------- Release
      # `artifacts/` (não `dist/`, que é onde o Vite gera o frontend) reúne só
      # os pacotes que queremos publicar.
      - name: Publicar no release (rascunho)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.0.0-build{0}', github.run_number) }}
          name: Printseca ${{ github.ref_type == 'tag' && github.ref_name || format('(build {0})', github.run_number) }}
          body: "Baixe o instalador da sua plataforma nos assets abaixo."
          files: printseca/artifacts/*
